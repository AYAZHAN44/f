<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:#080810;min-height:100vh;font-family:'Manrope',sans-serif;color:#f0eff4;overscroll-behavior:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:4px}
input,button,textarea,select{font-family:'Manrope',sans-serif}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;animation:fadeIn 0.25s forwards}
@keyframes fadeIn{to{opacity:1}}
.modal-box{background:#13131f;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:2rem;width:100%;max-width:440px;transform:translateY(20px);animation:slideUp 0.3s forwards}
@keyframes slideUp{to{transform:translateY(0)}}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e1e2e;border:1px solid rgba(255,170,0,0.3);border-radius:14px;padding:12px 24px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;animation:toastIn 0.3s ease,toastOut 0.3s ease 2s forwards}
@keyframes toastIn{from{opacity:0;bottom:60px}to{opacity:1;bottom:80px}}
@keyframes toastOut{to{opacity:0;bottom:60px}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,20,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.08);display:flex;z-index:500;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav button{flex:1;padding:12px 4px 10px;background:none;border:none;cursor:pointer;color:#5a5970;font-size:11px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s;font-family:'Manrope',sans-serif}
.bottom-nav button.active{color:#ffaa00}
.bottom-nav button span.icon{font-size:22px;line-height:1}

/* CARDS */
.card{background:#13131f;border:1px solid rgba(255,255,255,0.07);border-radius:20px;transition:all 0.22s}
.card-hover:hover{border-color:rgba(255,170,0,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,170,0,0.12)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;font-weight:700;cursor:pointer;transition:all 0.18s;font-family:'Manrope',sans-serif;letter-spacing:0.2px}
.btn-primary{background:#ffaa00;color:#000;padding:14px 24px;font-size:15px}
.btn-primary:hover{background:#e69900}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{background:rgba(255,255,255,0.07);color:#f0eff4;border:1px solid rgba(255,255,255,0.1);padding:12px 20px;font-size:14px}
.btn-secondary:hover{background:rgba(255,255,255,0.12)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
.btn-ghost{background:transparent;color:#f0eff4;border:1px solid rgba(255,255,255,0.12);padding:10px 18px;font-size:14px}
.btn-ghost:hover{background:rgba(255,255,255,0.06)}
.btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:10px 18px;font-size:14px}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* INPUTS */
.inp{width:100%;background:#0f0f1a;border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px 16px;font-size:15px;color:#f0eff4;outline:none;transition:all 0.2s;-webkit-appearance:none}
.inp:focus{border-color:#ffaa00;box-shadow:0 0 0 3px rgba(255,170,0,0.12)}
.inp::placeholder{color:#4a4960}

/* PAGE */
.page{min-height:100vh;padding-bottom:80px}
.page-header{position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.9);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 1rem}
.page-header-inner{max-width:640px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between}

/* SECTION */
.section{max-width:640px;margin:0 auto;padding:1.5rem 1rem}

/* BADGE */
.badge{display:inline-flex;align-items:center;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:0.5px}

/* SHIMMER */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shimmer{background:linear-gradient(90deg,#13131f 25%,#1e1e30 50%,#13131f 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

/* RESPONSIVE */
@media(min-width:768px){
  .section{padding:2rem 1.5rem}
  .page-header{padding:0 2rem}
  .bottom-nav{display:none}
  .desktop-nav{display:flex!important}
}
@media(max-width:767px){
  .desktop-nav{display:none!important}
}

/* GRADIENT TEXT */
.grad-text{background:linear-gradient(135deg,#ffaa00,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* HERO */
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,170,0,0.12);border:1px solid rgba(255,170,0,0.3);border-radius:30px;padding:6px 16px;font-size:13px;color:#ffaa00;font-weight:600}

/* RESTAURANT CARD */
.rest-card{cursor:pointer;overflow:hidden}
.rest-card img{width:100%;height:180px;object-fit:cover;transition:transform 0.4s}
.rest-card:hover img{transform:scale(1.05)}

/* MENU ITEM */
.menu-item{display:flex;gap:0;overflow:hidden}
.menu-item-img{width:90px;height:90px;object-fit:cover;flex-shrink:0}

/* PAYMENT CARD (Kaspi style) */
.pay-card{border-radius:18px;padding:1.5rem;cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.pay-card.active{border-color:#ffaa00;background:rgba(255,170,0,0.08)}
.pay-card:not(.active){background:#0f0f1a;border-color:rgba(255,255,255,0.08)}

/* STATUS STEPS */
.step-line{width:2px;flex:1;min-height:28px;transition:background 0.4s}

/* TOGGLE */
.toggle{width:52px;height:28px;border-radius:14px;position:relative;cursor:pointer;border:none;transition:background 0.3s}
.toggle-thumb{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left 0.3s}

/* ADMIN TABLE */
.admin-table{width:100%;border-collapse:collapse;font-size:14px}
.admin-table th{padding:10px 12px;color:#5a5970;text-align:left;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.06)}
.admin-table td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.04)}

/* SCROLL CATS */
.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:8px 18px;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.18s;border:none;font-family:'Manrope',sans-serif}

/* MAP CANVAS */
canvas.map{border-radius:16px;display:block;width:100%}

/* LOGIN PAGE */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:#080810}

/* KASPI QR ANIM */
@keyframes qrPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.qr-anim{animation:qrPulse 1.5s infinite}

/* FLOATING BTN */
.fab{position:fixed;bottom:90px;right:20px;z-index:400;border-radius:50px;padding:14px 20px;box-shadow:0 8px 32px rgba(255,170,0,0.3);font-size:14px;font-weight:700}
@media(min-width:768px){.fab{bottom:24px}}
</style>

function ls(key, def) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// Load persisted state

  return sum + (item ? item.price * qty : 0);
}, 0);

function navigate(page, data=null) {
  state.prevPage = state.page;
  if (page === "restaurant" && data) state.restaurant = data;
  if (page === "tracking") startTracking();
  state.page = page;
  state.search = "";
  window.scrollTo(0,0);
  render();
}

  state.toastMsg = msg;
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(() => { state.toastMsg = null; render(); }, 2500);
  render();
}

function addToCart(item) {
  state.cart[item.id] = (state.cart[item.id] || 0) + 1;
  state.cartItems[item.id] = item;
  lsSet("ffg_cart", state.cart);
  lsSet("ffg_cartItems", state.cartItems);
  showToast("🛒 " + item.name + " қосылды!");
}

function updateQty(id, d) {
  const nv = Math.max(0, (state.cart[id] || 0) + d);
  if (nv === 0) { delete state.cart[id]; }
  else { state.cart[id] = nv; }
  lsSet("ffg_cart", state.cart);
  render();
}

function startTracking() {
  state.trackingStatus = 0;
  state.trackingEta = 28;
  if (state.trackingTimer) clearInterval(state.trackingTimer);
  const steps = [0, 8000, 18000, 30000, 45000];
  steps.forEach((ms, i) => {
    setTimeout(() => { state.trackingStatus = i; render(); }, ms);
  });
  state.trackingTimer = setInterval(() => {
    state.trackingEta = Math.max(0, state.trackingEta - 0.05);
    render();
  }, 3000);
}

// ===================== RENDER =====================
function render() {
  const app = document.getElementById("app");
  app.innerHTML = buildPage();
  attachEvents();
  // Draw map if canvas present
  const canvas = document.getElementById("map-canvas");
  if (canvas) drawMap(canvas, STATUSES[state.trackingStatus]?.key || "placed");
  const courierCanvas = document.getElementById("courier-map");
  if (courierCanvas) drawMap(courierCanvas, ["placed","preparing","pickup","arrived"][state.courierStep] || "placed");
}

function buildPage() {
  let toast = "";
  if (state.toastMsg) {
    toast = `<div class="toast">${state.toastMsg}</div>`;
  }

  let content = "";
  switch(state.page) {
    case "home":       content = buildHome(); break;
    case "restaurant": content = buildRestaurant(); break;
    case "cart":       content = buildCart(); break;
    case "payment":    content = buildPayment(); break;
    case "tracking":   content = buildTracking(); break;
    case "account":    content = buildAccount(); break;
    case "courier":    content = buildCourier(); break;
    case "admin":      content = buildAdmin(); break;
    case "adminLogin": content = buildAdminLogin(); break;
    default:           content = buildHome();
  }

  const bottomNav = buildBottomNav();
  const desktopNav = buildDesktopNav();

  return `${desktopNav}${content}${bottomNav}${toast}`;
}

// ===================== BOTTOM NAV =====================
function buildBottomNav() {
  if (["adminLogin","admin","courier"].includes(state.page)) return "";
  const tabs = [
    {id:"home",  icon:"🏠", label:L("home")},
    {id:"cart",  icon:"🛒", label:L("cart"),  badge: cartCount()},
    {id:"account",icon:"👤",label:L("account")},
  ];
  const btns = tabs.map(t => `
    <button class="${state.page===t.id?"active":""}" onclick="navigate('${t.id}')">
      <span class="icon">${t.icon}${t.badge>0?`<span style="position:relative"><span style="position:absolute;top:-8px;right:-8px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:inline-flex;align-items:center;justify-content:center;font-weight:700">${t.badge}</span></span>`:""}</span>
      <span>${t.label}</span>
    </button>
  `).join("");
  return `<nav class="bottom-nav">${btns}</nav>`;
}

  const items = filtered.map(item => {

function addToCartById(id) {
  // Find item in current restaurant menu
  const r = state.restaurant;

  const menu = MENU[r.id] || [];
  const item = menu.find(i => i.id === id);
  if (item) addToCart(item);

function buildKaspiQR(total) {
  // Kaspi-style QR payment screen
  const qrCells = [];
  const seed = 12345;
  for (let row=0; row<21; row++) {
    for (let col=0; col<21; col++) {
      const corner = (row<7&&col<7)||(row<7&&col>13)||(row>13&&col<7);
      const cornerInner = (row>=2&&row<=4&&col>=2&&col<=4)||(row>=2&&row<=4&&col>=16&&col<=18)||(row>=16&&row<=18&&col>=2&&col<=4);
      const isBorder = (row===0||row===6||col===0||col===6)&&row<7&&col<7;
      const isBorder2 = (row===0||row===6||col===14||col===20)&&row<7&&col>13;
      const isBorder3 = (row===14||row===20||col===0||col===6)&&row>13&&col<7;
      let fill = "#080810";
      if (cornerInner) fill="#ffaa00";
      else if (corner||isBorder||isBorder2||isBorder3) fill="#f0eff4";
      else if ((row*17+col*13+seed)%3===0) fill="#f0eff4";
      qrCells.push(`<rect x="${col*10}" y="${row*10}" width="9" height="9" fill="${fill}" rx="1"/>`);
    }
  }

  return `
  <div class="page">
    <div class="page-header">

        <div style="display:inline-block;background:#080810;padding:16px;border-radius:16px;margin-bottom:1rem" class="qr-anim">
          <svg width="210" height="210" viewBox="0 0 210 210">${qrCells.join("")}</svg>
        </div>
        <div style="font-size:12px;color:#4a4960">
          ${state.lang==="ru"?"QR действителен 10 минут":"QR 10 минут жарамды"}

// ===================== MAP CANVAS =====================
function drawMap(canvas, status) {
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  const route = [{x:.12,y:.78},{x:.25,y:.62},{x:.4,y:.55},{x:.52,y:.45},{x:.65,y:.35},{x:.8,y:.25}];
  const statusMap = {placed:0, preparing:0.05, ready:0.12, pickup:0.45, arrived:1};
  const t = statusMap[status] || 0;

  function lerp(a,b,t) { return a+(b-a)*t; }
  function lerpPt(pts, t) {
    const seg = pts.length-1;
    const i = Math.min(Math.floor(t*seg), seg-1);
    const lt = t*seg-i;
    return {x: lerp(pts[i].x, pts[i+1].x, lt), y: lerp(pts[i].y, pts[i+1].y, lt)};
  }

  ctx.fillStyle = "#0b0b16";
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = "rgba(255,255,255,0.03)";
  ctx.lineWidth = 1;
  for(let i=0;i<12;i++){
    ctx.beginPath(); ctx.moveTo(i*W/11,0); ctx.lineTo(i*W/11,H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*H/11); ctx.lineTo(W,i*H/11); ctx.stroke();
  }

  // Roads
  const roads = [
    [[0.1,0.9],[0.5,0.5],[0.9,0.1]],[[0,0.5],[1,0.5]],
    [[0.5,0],[0.5,1]],[[0,0.3],[1,0.7]],[[0.2,0],[0.8,1]],[[0,0.7],[0.6,0.1]]
  ];
  ctx.strokeStyle = "rgba(255,255,255,0.07)"; ctx.lineWidth = 3;
  roads.forEach(pts => {
    ctx.beginPath(); ctx.moveTo(pts[0][0]*W, pts[0][1]*H);
    pts.slice(1).forEach(p => ctx.lineTo(p[0]*W, p[1]*H)); ctx.stroke();
  });

  // Dotted route
  ctx.strokeStyle = "rgba(255,170,0,0.3)"; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(route[0].x*W, route[0].y*H);
  route.forEach(p => ctx.lineTo(p.x*W, p.y*H)); ctx.stroke();
  ctx.setLineDash([]);

  // Progress route
  ctx.strokeStyle = "#ffaa00"; ctx.lineWidth = 3;
  ctx.beginPath();
  for(let i=0;i<=60;i++){
    const pt = lerpPt(route, Math.min(i/60,t));
    i===0 ? ctx.moveTo(pt.x*W,pt.y*H) : ctx.lineTo(pt.x*W,pt.y*H);
  } ctx.stroke();

  // Destination
  const dest = route[route.length-1];
  ctx.shadowColor = "#3b82f6"; ctx.shadowBlur = 16;
  ctx.fillStyle = "#3b82f6";
  ctx.beginPath(); ctx.arc(dest.x*W, dest.y*H, 9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(dest.x*W, dest.y*H, 4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Courier
  const pos = lerpPt(route, t);
  ctx.shadowColor = "#ffaa00"; ctx.shadowBlur = 20;
  ctx.fillStyle = "#ffaa00";
  ctx.beginPath(); ctx.arc(pos.x*W, pos.y*H, 13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "bold 13px sans-serif";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("🛵", pos.x*W, pos.y*H+1);
  ctx.shadowBlur = 0;

  // Pulse
  const pulse = (Date.now()%1200)/1200;
  ctx.strokeStyle = `rgba(255,170,0,${0.5*(1-pulse)})`; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(pos.x*W, pos.y*H, 13+pulse*22,0,Math.PI*2); ctx.stroke();
}

function doAdminLogin() {
  const login = document.getElementById("admin-login")?.value || "";
  const pass = document.getElementById("admin-pass")?.value || "";
  if (login === ADMIN_CREDENTIALS.login && pass === ADMIN_CREDENTIALS.password) {
    state.adminLoggedIn = true;
    state.loginError = false;
    lsSet("ffg_admin", true);
    navigate("admin");
  } else {
    state.loginError = true;
    render();
  }
}

          <button class="btn btn-ghost btn-sm" onclick="toggleLang()">🌐 ${state.lang==="ru"?"Қаз":"Рус"}</button>
          <span class="badge" style="background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.2)">FastFoodGo v2.0</span>
          <button class="btn btn-danger btn-sm" onclick="doLogout()">🚪 ${L("logout")}</button>
        </div>
      </div>
    </nav>
    <div style="max-width:1100px;margin:0 auto;padding:1.5rem 1rem 3rem">
      <div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:1.5rem;padding-bottom:4px;scrollbar-width:none">
        ${tabBtns}
      </div>
      ${content}
    </div>
  </div>`;
}

function doLogout() {
  state.adminLoggedIn = false;
  lsSet("ffg_admin", false);
  navigate("home");
  showToast("👋 " + (state.lang==="ru"?"Вы вышли из системы":"Жүйеден шықтыңыз"));
}

// ===================== ATTACH EVENTS =====================
function attachEvents() {
  // Enter key for admin login
  const passInp = document.getElementById("admin-pass");
  if (passInp) {
    passInp.addEventListener("keydown", e => { if(e.key==="Enter") doAdminLogin(); });
  }

  // Card number formatting
  window.formatCard = function(inp) {
    let v = inp.value.replace(/\D/g,"");
    v = v.substring(0,16);
    inp.value = v.replace(/(.{4})/g,"$1 ").trim();
    const display = document.getElementById("card-num-display");
    if (display) {
      const padded = (v+"").padEnd(16,"•");
      display.textContent = padded.replace(/(.{4})/g,"$1 ").trim();
    }
  };
  window.formatExp = function(inp) {
    let v = inp.value.replace(/\D/g,"");
    if (v.length >= 2) v = v.substring(0,2)+"/"+v.substring(2,4);
    inp.value = v;
  };

  // Map animation loop
  const mapCanvas = document.getElementById("map-canvas");
  const courierMapCanvas = document.getElementById("courier-map");
  if (mapCanvas || courierMapCanvas) {
    (function loop() {
      if (document.getElementById("map-canvas") || document.getElementById("courier-map")) {
        if (document.getElementById("map-canvas")) drawMap(document.getElementById("map-canvas"), STATUSES[state.trackingStatus]?.key||"placed");
        if (document.getElementById("courier-map")) drawMap(document.getElementById("courier-map"), ["placed","preparing","pickup","arrived"][state.courierStep]||"placed");
        requestAnimationFrame(loop);
      }
    })();
  }
}

// ===================== INIT =====================
window.navigate = navigate;
window.toggleLang = toggleLang;
window.goAdmin = goAdmin;
window.setCat = setCat;
window.addToCart = addToCart;
window.addToCartById = addToCartById;
window.updateQty = updateQty;
window.applyPromo = applyPromo;
window.goToPayment = goToPayment;
window.simulatePay = simulatePay;
window.completeOrder = completeOrder;
window.doAdminLogin = doAdminLogin;
window.doLogout = doLogout;
window.showToast = showToast;
window.lsSet = lsSet;
window.state = state;

render();
</script>
